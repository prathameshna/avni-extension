<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avni Extension</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Avni</span>
      </div>
      <button class="icon-btn" id="open-dashboard" title="Open Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-target="clipboard-view">Clipboard</button>
      <button class="tab-btn" data-target="context-view">Context</button>
      <button class="tab-btn" data-target="token-view">Tokens</button>
    </nav>

    <main class="content-area">
      <!-- Clipboard View (Default) -->
      <section id="clipboard-view" class="tab-content active">
        <div class="search-bar">
          <input type="text" placeholder="Search clipboard..." id="clipboard-search">
        </div>
        <ul class="item-list" id="clipboard-list">
          <!-- Placeholder data -->
          <li class="item-card">
            <div class="item-header">
              <span class="item-title">System Prompt</span>
              <span class="item-time">2m ago</span>
            </div>
            <p class="item-desc">Act as an expert software engineer...</p>
          </li>
          <li class="item-card">
            <div class="item-header">
              <span class="item-title">API Response</span>
              <span class="item-time">1h ago</span>
            </div>
            <p class="item-desc">{ "status": "success", "data": [...] }</p>
          </li>
        </ul>
      </section>

      <!-- Context View -->
      <section id="context-view" class="tab-content">
        <div class="empty-state">
          <!-- TODO: Implement context view logic -->
          <p>No active context selected.</p>
          <button class="primary-btn">Add Context</button>
        </div>
      </section>

      <!-- Token Manager View -->
      <section id="token-view" class="tab-content">
        <div class="token-stats">
          <div class="stat-card">
            <span class="stat-label">Total Tokens</span>
            <span class="stat-value">45.2K</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Estimated Cost</span>
            <span class="stat-value">$0.04</span>
          </div>
        </div>
        <!-- TODO: Implement detailed token tracking -->
      </section>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
